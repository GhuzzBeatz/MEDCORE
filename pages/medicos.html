<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../css/style.css"><script src="../js/util.js"></script></head>
<body>
<div class="page-wrap">
  <div class="page-header"><div><div class="page-title">🩺 Médicos</div><div class="page-sub">Equipe médica da clínica</div></div></div>

  <div class="form-card">
    <div class="form-card-title" id="formTitulo">Novo Médico</div>
    <div class="form-row">
      <div class="form-group fg3"><label class="form-label">Nome Completo *</label><input id="nome" placeholder="Dr. Nome Completo"></div>
      <div class="form-group fg1"><label class="form-label">CRM</label><input id="crm" placeholder="CRM/SP 000000"></div>
      <div class="form-group fg2"><label class="form-label">Especialidade</label><input id="especialidade" placeholder="Ex: Clínica Geral, Ortopedia..."></div>
    </div>
    <div class="form-row">
      <div class="form-group fg2"><label class="form-label">Telefone</label><input id="telefone" placeholder="(11) 99999-9999"></div>
      <div class="form-group fg2"><label class="form-label">E-mail</label><input id="email" type="email" placeholder="email@clinica.com"></div>
      <div class="form-group fg1"><label class="form-label">Status</label>
        <select id="ativo"><option value="1">Ativo</option><option value="0">Inativo</option></select>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:13px">
      <button class="btn btn-primary" id="btnSalvar" onclick="salvar()">+ Salvar Médico</button>
      <button class="btn-cancel" id="btnCancelar" onclick="cancelar()">Cancelar</button>
    </div>
    <div class="aviso av-erro" id="avisoErro"></div>
    <div class="aviso av-ok"   id="avisoOk"></div>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-top">
      <span class="tbl-title">Médicos Cadastrados</span>
      <div style="display:flex;gap:10px;align-items:center">
        <input class="search-box" id="busca" placeholder="🔍 Buscar..." oninput="render()">
        <span class="tbl-count" id="count"></span>
      </div>
    </div>
    <table>
      <thead><tr><th>Nome</th><th>CRM</th><th>Especialidade</th><th>Telefone</th><th>E-mail</th><th style="text-align:center">Status</th><th style="text-align:center">Ações</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
aplicarTemaAtual()
const { listarMedicos, inserirMedico, atualizarMedico, deletarMedico } = require('../js/db.js')
let editandoId = null

function salvar() {
  const nome = document.getElementById('nome').value.trim()
  if (!nome) return aviso('erro','Informe o nome do médico.')
  const d = { nome, crm:document.getElementById('crm').value.trim(), especialidade:document.getElementById('especialidade').value.trim(), telefone:document.getElementById('telefone').value.trim(), email:document.getElementById('email').value.trim(), ativo:Number(document.getElementById('ativo').value) }
  if (editandoId) { atualizarMedico({...d, id:editandoId}); aviso('ok','Médico atualizado!'); cancelar() }
  else { inserirMedico(d); aviso('ok',`Dr(a). ${nome} cadastrado(a)!`); limpar() }
  render()
}

function editar(id) {
  const { getMedico } = require('../js/db.js')
  const m = getMedico(id)
  if (!m) return
  document.getElementById('nome').value         = m.nome
  document.getElementById('crm').value          = m.crm||''
  document.getElementById('especialidade').value= m.especialidade||''
  document.getElementById('telefone').value     = m.telefone||''
  document.getElementById('email').value        = m.email||''
  document.getElementById('ativo').value        = m.ativo
  document.getElementById('formTitulo').textContent     = '✏️ Editar Médico'
  document.getElementById('btnSalvar').textContent      = '💾 Salvar Alteração'
  document.getElementById('btnCancelar').style.display  = 'inline-flex'
  editandoId = id; window.scrollTo({top:0,behavior:'smooth'})
}

function cancelar() { limpar(); editandoId=null; document.getElementById('formTitulo').textContent='Novo Médico'; document.getElementById('btnSalvar').textContent='+ Salvar Médico'; document.getElementById('btnCancelar').style.display='none' }
function limpar()   { ['nome','crm','especialidade','telefone','email'].forEach(i=>document.getElementById(i).value=''); document.getElementById('ativo').value='1' }

function excluir(id) {
  confirmar('Excluir este médico? Esta ação não pode ser desfeita.', ok => { if(ok) { deletarMedico(id); render() } })
}

function render() {
  const busca = (document.getElementById('busca')?.value||'').toLowerCase()
  const lista = listarMedicos().filter(m=>!busca||m.nome.toLowerCase().includes(busca)||(m.especialidade||'').toLowerCase().includes(busca))
  document.getElementById('count').textContent = listarMedicos().length+' médico(s)'
  document.getElementById('tbody').innerHTML = lista.length ? lista.map(m=>`
    <tr>
      <td><b style="color:var(--fg)">${m.nome}</b></td>
      <td style="font-size:12px;color:var(--muted)">${m.crm||'—'}</td>
      <td><span class="badge b-teal">${m.especialidade||'—'}</span></td>
      <td>${m.telefone||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${m.email||'—'}</td>
      <td style="text-align:center"><span class="badge ${m.ativo?'b-green':'b-red'}">${m.ativo?'Ativo':'Inativo'}</span></td>
      <td style="text-align:center;white-space:nowrap">
        <button class="btn-edit" onclick="editar(${m.id})">✏️</button>
        <button class="btn-danger" onclick="excluir(${m.id})">🗑️</button>
      </td>
    </tr>`).join('')
  : '<tr><td colspan="7" class="empty">Nenhum médico cadastrado.</td></tr>'
}
render()
</script>
</body></html>
