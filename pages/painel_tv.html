<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="../js/util.js"></script>
<title>MedCore — Painel de Chamada</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a1628;
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOPO */
  .topo {
    background: linear-gradient(135deg, #1e3a8a, #0891b2);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .topo-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .topo-logo .icone {
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .topo-logo .nome {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .topo-logo .nome span { color: #7dd3fc; }
  .topo-logo .sub {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }
  .topo-hora {
    text-align: right;
  }
  .hora-txt {
    font-size: 42px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }
  .data-txt {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    margin-top: 4px;
    text-align: right;
  }

  /* ÁREA PRINCIPAL */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 60px;
  }

  /* ESTADO: AGUARDANDO */
  .aguardando {
    text-align: center;
    display: none;
  }
  .aguardando .icone-esp {
    font-size: 80px;
    margin-bottom: 20px;
    opacity: 0.3;
  }
  .aguardando .txt {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ESTADO: CHAMADA ATIVA */
  .chamada {
    text-align: center;
    animation: entrar 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: none;
    width: 100%;
    max-width: 900px;
  }
  @keyframes entrar {
    from { transform: scale(0.7) translateY(40px); opacity: 0; }
    to   { transform: scale(1) translateY(0);       opacity: 1; }
  }

  .label-chamada {
    font-size: 18px;
    font-weight: 800;
    color: #7dd3fc;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .label-chamada::before,
  .label-chamada::after {
    content: '';
    display: block;
    height: 2px;
    width: 60px;
    background: #7dd3fc;
    opacity: 0.4;
    border-radius: 2px;
  }

  .card-paciente {
    background: linear-gradient(135deg, #1e3a8a 0%, #0e7490 100%);
    border: 2px solid rgba(125, 211, 252, 0.3);
    border-radius: 24px;
    padding: 50px 60px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  .card-paciente::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(125,211,252,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .nome-paciente {
    font-size: clamp(48px, 7vw, 86px);
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1.1;
    text-transform: uppercase;
    text-shadow: 0 4px 30px rgba(0,0,0,0.4);
    margin-bottom: 30px;
    word-break: break-word;
  }

  .infos-chamada {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .info-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
  }
  .info-pill .emoji { font-size: 20px; }

  /* HISTÓRICO LATERAL */
  .historico-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .hist-label {
    font-size: 11px;
    font-weight: 800;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 3px;
    white-space: nowrap;
  }
  .hist-lista {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .hist-item {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
  }

  /* PULSAR no label quando chamando */
  .pulsando {
    animation: pulsar 1.4s ease-in-out infinite;
  }
  @keyframes pulsar {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }
</style>
</head>
<body>

<div class="topo">
  <div class="topo-logo">
    <div class="icone">🏥</div>
    <div>
      <div class="nome">Med<span>Core</span></div>
      <div class="sub">Painel de Chamada — Sala de Espera</div>
    </div>
  </div>
  <div class="topo-hora">
    <div class="hora-txt" id="hora">00:00</div>
    <div class="data-txt" id="dataAtual"></div>
  </div>
</div>

<div class="main">

  <!-- Aguardando -->
  <div class="aguardando" id="aguardando">
    <div class="icone-esp">🪑</div>
    <div class="txt">Aguardando chamada...</div>
  </div>

  <!-- Chamada ativa -->
  <div class="chamada" id="chamada">
    <div class="label-chamada pulsando" id="labelChamada">🔔 Chamando</div>
    <div class="card-paciente">
      <div class="nome-paciente" id="nomePaciente">—</div>
      <div class="infos-chamada" id="infosDiv"></div>
    </div>
  </div>

</div>

<!-- Histórico de chamadas recentes -->
<div class="historico-wrap">
  <div class="hist-label">Anteriores</div>
  <div class="hist-lista" id="historico">
    <div class="hist-item" style="color:rgba(255,255,255,0.2)">Nenhuma chamada anterior</div>
  </div>
</div>

<script>
aplicarTemaAtual()

const fs   = require('fs')
const path = require('path')

// Pega o data-dir passado pelo main.js
const argDir = process.argv.find(a => a.startsWith('--data-dir='))
const DATA_DIR = argDir ? argDir.replace('--data-dir=', '') : path.join(__dirname, '..', 'data')
const CHAMADA_FILE = path.join(DATA_DIR, 'chamada.json')

let ultimaChamadaId = null
const historico = []

// ── RELÓGIO ──────────────────────────────────────────────
function atualizarRelogio() {
  const now = new Date()
  document.getElementById('hora').textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
  document.getElementById('dataAtual').textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
}
setInterval(atualizarRelogio, 1000)
atualizarRelogio()

// ── LER CHAMADA ───────────────────────────────────────────
function lerChamada() {
  try {
    if (!fs.existsSync(CHAMADA_FILE)) {
      mostrarAguardando(); return
    }
    const dados = JSON.parse(fs.readFileSync(CHAMADA_FILE, 'utf8'))
    if (!dados || !dados.id) { mostrarAguardando(); return }

    // Nova chamada?
    if (dados.id !== ultimaChamadaId) {
      ultimaChamadaId = dados.id

      // Adiciona ao histórico
      if (dados.nome) {
        historico.unshift(dados.nome)
        if (historico.length > 6) historico.pop()
        renderHistorico()
      }

      // Mostra chamada
      mostrarChamada(dados)
    }
  } catch(e) {
    mostrarAguardando()
  }
}

function mostrarAguardando() {
  document.getElementById('aguardando').style.display = 'block'
  document.getElementById('chamada').style.display    = 'none'
}

function mostrarChamada(dados) {
  document.getElementById('aguardando').style.display = 'none'

  // Reinicia animação
  const el = document.getElementById('chamada')
  el.style.display = 'none'
  void el.offsetWidth // força reflow
  el.style.display = 'block'

  document.getElementById('nomePaciente').textContent = (dados.nome || '').toUpperCase()

  // Pills de info
  const pills = []
  if (dados.medico) pills.push(`<div class="info-pill"><span class="emoji">🩺</span> ${dados.medico}</div>`)
  if (dados.sala)   pills.push(`<div class="info-pill"><span class="emoji">🚪</span> ${dados.sala}</div>`)
  if (dados.tipo)   pills.push(`<div class="info-pill"><span class="emoji">📋</span> ${dados.tipo}</div>`)
  document.getElementById('infosDiv').innerHTML = pills.join('')
}

function renderHistorico() {
  const el = document.getElementById('historico')
  if (!historico.length) {
    el.innerHTML = '<div class="hist-item" style="color:rgba(255,255,255,0.2)">Nenhuma chamada anterior</div>'
    return
  }
  el.innerHTML = historico.map(n => `<div class="hist-item">${n}</div>`).join('')
}

// Começa aguardando
mostrarAguardando()

// Polling a cada 2 segundos
setInterval(lerChamada, 2000)
lerChamada()
</script>
</body>
</html>
